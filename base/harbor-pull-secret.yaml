# Harbor pull credentials for the wiki-mcp namespace.
#
# InfisicalSecret CR per the homelab-secrets convention — NEVER commit
# literal stringData/data for credentials. Infisical operator materializes
# this into a kubernetes.io/dockerconfigjson Secret named
# `wiki-mcp-harbor-pull` that the Deployment references via imagePullSecrets.
#
# Pattern copied verbatim from rpg-dice-mcp / mealie-mcp / kroger-mcp.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: wiki-mcp-harbor-pull
  namespace: wiki-mcp
  labels:
    app.kubernetes.io/name: wiki-mcp
    app.kubernetes.io/part-of: homelab-mcp
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical-operator
      secretsScope:
        envSlug: prod
        projectSlug: homelab-bz-gt
        recursive: false
        secretsPath: /
  hostAPI: https://infisical.sirddail.net/api
  managedSecretReference:
    creationPolicy: Orphan
    secretName: wiki-mcp-harbor-pull
    secretNamespace: wiki-mcp
    secretType: kubernetes.io/dockerconfigjson
    template:
      data:
        .dockerconfigjson: '{"auths":{"{{ .HB_REGISTRY.Value }}":{"username":"{{ .HB_USERNAME.Value }}","password":"{{ .HB_PASSWORD.Value }}","auth":"{{ .HB_AUTH.Value }}"},"harbor-core.harbor.svc.cluster.local":{"username":"{{ .HB_USERNAME.Value }}","password":"{{ .HB_PASSWORD.Value }}","auth":"{{ .HB_AUTH.Value }}"}}}'
      includeAllSecrets: false
  resyncInterval: 60
