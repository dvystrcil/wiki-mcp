# Grants argocd-image-updater-controller permission to read the
# wiki-mcp-harbor-pull imagePullSecret in this namespace, so it can
# authenticate to Harbor when scanning for new image tags.
#
# Mirrors freecad-mcp / mealie-mcp / kroger-mcp pattern. Lives in this
# CD repo per the RBAC-ownership rule (memory rbac-ownership): a
# controller's permissions into namespace X belong in X's repo.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater-secret-reader
  namespace: wiki-mcp
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - wiki-mcp-harbor-pull
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater-secret-reader
  namespace: wiki-mcp
subjects:
- kind: ServiceAccount
  name: argocd-image-updater-controller
  namespace: argocd
roleRef:
  kind: Role
  name: argocd-image-updater-secret-reader
  apiGroup: rbac.authorization.k8s.io
