# GitHub PAT for the wiki-mcp git-sync sidecar.
#
# The sidecar reads + writes against dvystrcil/llm-wiki (which is private),
# so it needs a token. Fine-grained PAT, scope: contents:rw on llm-wiki only.
#
# USER-MANAGED in Infisical: GITHUB_TOKEN_WIKI_MCP must exist in the
# homelab-bz-gt project, prod env, path "/". Generate it at:
#   https://github.com/settings/personal-access-tokens/new
#   - Resource owner: dvystrcil
#   - Expiration: 1 year (set a calendar reminder)
#   - Repository access: Only select repositories → dvystrcil/llm-wiki
#   - Permissions → Repository → Contents → Read and write
#
# The sidecar URL-embeds this token as the username with x-access-token
# (GitHub's documented PAT-over-HTTPS pattern):
#   https://x-access-token:$GITHUB_TOKEN@github.com/dvystrcil/llm-wiki.git
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: wiki-mcp-github-token
  namespace: wiki-mcp
  labels:
    app.kubernetes.io/name: wiki-mcp
    app.kubernetes.io/part-of: homelab-mcp
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical-operator
      secretsScope:
        envSlug: prod
        projectSlug: homelab-bz-gt
        recursive: false
        secretsPath: /
  hostAPI: https://infisical.sirddail.net/api
  managedSecretReference:
    creationPolicy: Orphan
    secretName: wiki-mcp-github-token
    secretNamespace: wiki-mcp
    secretType: Opaque
    template:
      data:
        token: '{{ .GITHUB_TOKEN_WIKI_MCP.Value }}'
      includeAllSecrets: false
  resyncInterval: 60
