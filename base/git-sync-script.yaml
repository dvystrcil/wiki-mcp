# Sync scripts bundled as a ConfigMap so the sidecar image can stay generic
# (alpine + git + openssl/curl/jq, nothing wiki-specific baked in).
#
# Auth: GitHub App, NOT a PAT. get-token.sh mints a short-lived (≤1h)
# installation token from the GITSYNC_App private key in-process; init.sh and
# sync.sh embed it in the clone URL. Mirrors quartz-viewer's App-based pull of
# the same repo — the difference is wiki-mcp also PUSHES, so the App needs
# Contents: read AND write on dvystrcil/llm-wiki (quartz-viewer uses the same
# App read-only). No long-lived token on disk, nothing to rotate, no expiry.
#
# Sync loop semantics:
#   1. refresh the installation token if the cached one is stale (>40m)
#   2. commit any local writes with "wiki-mcp autosync <ts>"
#   3. git pull --rebase --autostash (autostash handles unstaged drift)
#   4. git push (no force; rebase conflict → sleep + retry next cycle)
#   5. sleep $SYNC_INTERVAL_SECONDS
#
# Race semantics: wiki-mcp writes are file-level atomic (Go os.WriteFile).
# A write that lands after `git add -A` is picked up next cycle. Worst-case
# publish latency = 2 × SYNC_INTERVAL.
#
# Failure semantics: any individual cycle can fail without crashing the
# sidecar — we always continue. The pod stays Ready; the next cycle retries.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiki-mcp-git-sync-script
  namespace: wiki-mcp
  labels:
    app.kubernetes.io/name: wiki-mcp
    app.kubernetes.io/part-of: homelab-mcp
data:
  get-token.sh: |
    #!/bin/sh
    # Mint a GitHub App installation token for dvystrcil/llm-wiki and echo it
    # (ghs_...) to stdout. Non-zero exit + diagnostic on stderr on failure.
    #
    # Inputs (env):
    #   GITSYNC_APP_CLIENT_ID        — App client id, used as the JWT issuer
    #   GITSYNC_APP_INSTALLATION_ID  — installation id on llm-wiki
    #   APP_PRIVATE_KEY_FILE         — PEM private key (default /app-key/private-key)
    #
    # JWT_ONLY=1 short-circuits after signing the JWT (prints it, no token
    # exchange) — used by tests/test-get-token-jwt.sh to validate signing
    # offline without GitHub or real credentials.
    set -eu

    KEY_FILE="${APP_PRIVATE_KEY_FILE:-/app-key/private-key}"

    # base64url: standard base64, +/ → -_, strip '=' padding (RFC 7515).
    b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }

    now="$(date +%s)"
    header='{"alg":"RS256","typ":"JWT"}'
    # iat backdated 60s to absorb clock skew; exp 9 min (GitHub ceiling 10).
    payload="$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' \
      "$((now - 60))" "$((now + 540))" "${GITSYNC_APP_CLIENT_ID}")"

    unsigned="$(printf '%s' "$header" | b64url).$(printf '%s' "$payload" | b64url)"
    sig="$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$KEY_FILE" -binary | b64url)"
    jwt="${unsigned}.${sig}"

    if [ "${JWT_ONLY:-}" = "1" ]; then
      printf '%s' "$jwt"
      exit 0
    fi

    resp="$(curl -fsS -X POST \
      -H "Authorization: Bearer ${jwt}" \
      -H "Accept: application/vnd.github+json" \
      -H "X-GitHub-Api-Version: 2022-11-28" \
      "https://api.github.com/app/installations/${GITSYNC_APP_INSTALLATION_ID}/access_tokens")" \
      || { echo "[get-token] installation-token request failed" >&2; exit 1; }

    token="$(printf '%s' "$resp" | jq -r '.token // empty')"
    [ -n "$token" ] || { echo "[get-token] no token in response: $resp" >&2; exit 1; }
    printf '%s' "$token"

  init.sh: |
    #!/bin/sh
    # Init: one-shot. Runs as initContainer before main + sidecar start.
    # Clones llm-wiki into the PVC if empty, otherwise fast-forwards.
    set -eu

    GIT_DIR="${WIKI_ROOT}/.git"

    apk add --no-cache git ca-certificates openssl curl jq >/dev/null

    TOKEN="$(sh /scripts/get-token.sh)"
    REPO_URL="https://x-access-token:${TOKEN}@github.com/dvystrcil/llm-wiki.git"

    if [ ! -d "$GIT_DIR" ]; then
      echo "[init] empty volume — cloning llm-wiki"
      git clone --depth 50 "$REPO_URL" "$WIKI_ROOT"
    else
      echo "[init] existing clone — fetching + fast-forwarding"
      cd "$WIKI_ROOT"
      # Refresh URL with the freshly minted token.
      git remote set-url origin "$REPO_URL"
      git fetch origin
      # If local has diverged we let the sidecar's --autostash handle it.
      git pull --rebase --autostash origin main || {
        echo "[init] pull failed — leaving volume as-is; sidecar will retry"
      }
    fi

    echo "[init] done"
    ls -la "$WIKI_ROOT" | head -20

  sync.sh: |
    #!/bin/sh
    # Sidecar loop. Reconciles the PVC with dvystrcil/llm-wiki on a cadence.
    set -u

    SYNC_INTERVAL_SECONDS="${SYNC_INTERVAL_SECONDS:-300}"
    AUTHOR_NAME="${AUTHOR_NAME:-wiki-mcp}"
    AUTHOR_EMAIL="${AUTHOR_EMAIL:-wiki-mcp@sirddail.net}"
    # Re-mint well inside the ~1h installation-token lifetime.
    TOKEN_MAX_AGE_SECONDS=2400

    apk add --no-cache git ca-certificates openssl curl jq >/dev/null

    cd "$WIKI_ROOT"
    git config user.name "$AUTHOR_NAME"
    git config user.email "$AUTHOR_EMAIL"

    TOKEN_AT=0
    # Mint a fresh token + repoint origin only when the cached one is stale.
    # Returns non-zero (without updating state) if minting fails, so the
    # caller can skip the cycle and retry rather than push with stale creds.
    refresh_token() {
      _now="$(date +%s)"
      if [ "$TOKEN_AT" -ne 0 ] && [ "$((_now - TOKEN_AT))" -lt "$TOKEN_MAX_AGE_SECONDS" ]; then
        return 0
      fi
      _token="$(sh /scripts/get-token.sh)" || return 1
      git remote set-url origin "https://x-access-token:${_token}@github.com/dvystrcil/llm-wiki.git"
      TOKEN_AT="$_now"
      echo "[sync] minted fresh installation token"
    }

    echo "[sync] loop starting, interval=${SYNC_INTERVAL_SECONDS}s"

    while true; do
      sleep "$SYNC_INTERVAL_SECONDS"

      ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      refresh_token || {
        echo "[sync] ${ts} token mint failed — will retry"
        continue
      }

      # 1. Commit any local writes
      git add -A
      if ! git diff --cached --quiet; then
        git commit -m "wiki-mcp autosync ${ts}" || true
        echo "[sync] ${ts} committed local writes"
      fi

      # 2. Reconcile with remote
      git pull --rebase --autostash origin main || {
        echo "[sync] ${ts} pull failed — will retry"
        continue
      }

      # 3. Push (no-op if nothing local). If push fails (e.g. branch
      # protection rejected the commit), log + carry on. The local
      # state stays committed and next pull will see the rejection.
      git push origin main || {
        echo "[sync] ${ts} push failed — branch protection? token scope?"
      }
    done
