# GitHub App credentials for the wiki-mcp git-sync sidecar.
#
# NOT a PAT. get-token.sh (see git-sync-script.yaml) mints a short-lived
# installation token from the App private key in-process — no long-lived
# credential on disk, no expiry, nothing to rotate on a calendar.
#
# Reuses the SAME GitHub App as quartz-viewer (GITSYNC_APP), already installed
# on dvystrcil/llm-wiki. quartz-viewer only PULLS (Contents: read); wiki-mcp
# also PUSHES autosync commits, so the App must grant:
#
#   Permissions → Repository → Contents → Read and write   (on llm-wiki only)
#
# Elevating GITSYNC_APP from read to read-write does NOT affect quartz-viewer
# (it simply never exercises the write). Scope stays one repo — deliberately
# narrower than the broad write-capable CICD App, whose key we keep out of
# long-running pods.
#
# USER-MANAGED in Infisical (project homelab-bz-gt, env prod, path /) — these
# already exist for quartz-viewer; wiki-mcp just references them:
#   GITSYNC_APP_CLIENT_ID        — the App's client id (Iv1.xxxx)
#   GITSYNC_APP_INSTALLATION_ID  — installation id on dvystrcil/llm-wiki
#   GITSYNC_APP_PRIVATE_KEY      — the App's PEM private key, full
#                                  -----BEGIN...END----- block incl. newlines
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: wiki-mcp-github-app
  namespace: wiki-mcp
  labels:
    app.kubernetes.io/name: wiki-mcp
    app.kubernetes.io/part-of: homelab-mcp
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical-operator
      secretsScope:
        envSlug: prod
        projectSlug: homelab-bz-gt
        recursive: false
        secretsPath: /
  hostAPI: https://infisical.sirddail.net/api
  managedSecretReference:
    creationPolicy: Orphan
    secretName: wiki-mcp-github-app
    secretNamespace: wiki-mcp
    secretType: Opaque
    template:
      data:
        GITSYNC_APP_CLIENT_ID: '{{ .GITSYNC_APP_CLIENT_ID.Value }}'
        GITSYNC_APP_INSTALLATION_ID: '{{ .GITSYNC_APP_INSTALLATION_ID.Value }}'
        GITSYNC_APP_PRIVATE_KEY: '{{ .GITSYNC_APP_PRIVATE_KEY.Value }}'
      includeAllSecrets: false
  resyncInterval: 60
